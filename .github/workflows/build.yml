name: Build fonts

on:
  push:
    branches: [main, develop]
    tags: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nicoverbruggen/fntbld-oci:latest

    steps:
      - uses: actions/checkout@v5

      - name: Build fonts
        run: python3 build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Sourcerer
          path: out/ttf/*.ttf

      - name: Upload Kobo artifact
        uses: actions/upload-artifact@v6
        with:
          name: KF_Sourcerer
          path: out/kf/*.ttf

      - name: Zip TTFs for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd out/ttf && zip -j ../../Sourcerer.zip *.ttf
          cd ../../out/kf && zip -j ../../KF_Sourcerer.zip *.ttf

      - name: Upload release zips
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: Sourcerer-release
          path: |
            Sourcerer.zip
            KF_Sourcerer.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: Sourcerer-release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: ${{ github.ref_name }}
          body: |
            > [!TIP]
            > **If you are using a Kobo device and reading books purchased from the Kobo Store or reading `kepub` files converted via Calibre**, you should download KF_Sourcerer.zip, which has fonts slightly altered for optimal kerning for the `kepub` renderer.

            ### Learn more

            Sourcerer is part of the `ebook-fonts` collection. For more information about those fonts, screenshots and how to install them, please consult the [README](https://github.com/nicoverbruggen/ebook-fonts/blob/main/README.md). The FAQ also includes an entry on how to enable ligatures on Kobo devices, which is highly recommended.
          files: |
            Sourcerer.zip
            KF_Sourcerer.zip
